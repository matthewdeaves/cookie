# Production nginx configuration for Cookie
# Runs alongside gunicorn in the same container

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Optimize file sending
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # JSON access log for structured logging in production
    log_format json_combined escape=json
      '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_user_agent":"$http_user_agent"'
      '}';

    access_log /dev/stdout json_combined;
    error_log /dev/stderr warn;

    upstream django {
        server 127.0.0.1:8000;
    }

    # Redirect HTTP to HTTPS (when SSL is configured)
    server {
        listen 80;
        server_name _;

        # Health check must work over HTTP (for Docker healthcheck)
        location /api/system/health/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
        }

        # Redirect everything else to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name _;

        # Cloudflare Origin Certificate (generate via Cloudflare dashboard)
        # Place cert files in /etc/nginx/ssl/ (mount via Docker volume)
        ssl_certificate /etc/nginx/ssl/origin.pem;
        ssl_certificate_key /etc/nginx/ssl/origin-key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self'; connect-src 'self'" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header X-Permitted-Cross-Domain-Policies "none" always;

        # Privacy policy -> Django (no auth required)
        location /privacy/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # API requests -> Django
        location /api/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Admin -> Django
        location /admin/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Legacy frontend -> Django (no caching for dynamic HTML)
        location /legacy/ {
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Static files (Django collected)
        location /static/ {
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Media files
        location /media/ {
            alias /app/data/media/;
        }

        # Modern frontend with legacy browser detection
        location / {
            # Detect legacy browsers that can't run modern React (ES2020+)
            # iOS < 11, IE, Edge Legacy
            set $legacy_browser 0;

            # iOS < 11 (check for OS 1_ through OS 10_)
            if ($http_user_agent ~* "(?:iPhone|iPad|iPod).*OS [1-9]_") {
                set $legacy_browser 1;
            }
            if ($http_user_agent ~* "(?:iPhone|iPad|iPod).*OS 10_") {
                set $legacy_browser 1;
            }

            # Internet Explorer (MSIE or Trident)
            if ($http_user_agent ~* "MSIE |Trident/") {
                set $legacy_browser 1;
            }

            # Edge Legacy (Edge/ without Edg/ which is Chromium)
            if ($http_user_agent ~* "Edge/[0-9]") {
                set $legacy_browser 1;
            }

            # Redirect legacy browsers to /legacy/
            if ($legacy_browser = 1) {
                return 302 /legacy/;
            }

            # Serve built frontend
            root /app/frontend/dist;
            try_files $uri $uri/ /index.html;

            # Cache static assets (JS, CSS have hashes in filenames)
            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                root /app/frontend/dist;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
