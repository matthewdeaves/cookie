# Production nginx configuration for Cookie
# Runs alongside gunicorn in the same container

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Hide nginx version in headers and error pages
    server_tokens off;

    # Limit request body size (recipe image uploads)
    client_max_body_size 10m;

    # Optimize file sending
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml;

    # JSON access log for structured logging in production
    log_format json_combined escape=json
      '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"method":"$request_method",'
        '"uri":"$uri",'
        '"status":$status,'
        '"body_bytes_sent":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"http_user_agent":"$http_user_agent"'
      '}';

    access_log /dev/stdout json_combined;
    error_log /dev/stderr warn;

    # Pass through X-Forwarded-Proto from the upstream reverse proxy
    # (Cloudflare, Traefik, ALB). Falls back to $scheme for direct access.
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    upstream django {
        server 127.0.0.1:8000;
    }

    # HTTP-only server — TLS is terminated by the upstream reverse proxy
    # (Cloudflare, Traefik, ALB, etc.) before traffic reaches this container.
    server {
        listen 80;
        server_name _;

        # Emit relative Location headers on nginx-generated redirects
        # (e.g. the trailing-slash 301 for /admin → /admin/). Without this,
        # nginx would build an absolute URL using $scheme = "http" (since
        # this server listens on plain HTTP) and return `Location: http://…`
        # behind an HTTPS-terminating proxy, exposing a scheme mismatch.
        absolute_redirect off;

        # Replace nginx's built-in 403/404 pages (directory-listing attempts
        # on /assets/, /media/, etc.) with a neutral minimal body so the stock
        # `<center>nginx</center>` footer stops leaking the proxy identity.
        # Django-proxied responses are unaffected because proxy_intercept_errors
        # is off by default — upstream 4xx bodies pass through untouched.
        #
        # NOTE: `return 404 "";` is a no-op in nginx — a zero-length body is
        # dropped and the HTTP core falls back to the default error page,
        # which re-exposes the `<center>nginx</center>` footer. Every block
        # below MUST use a non-empty body.
        #
        # 405 is rewritten to 404 so nginx-generated "method not allowed"
        # responses (which happen rarely — our own locations don't restrict
        # methods) don't leak the default error page either. Django-side
        # 405 responses are collapsed to 404 by MethodNotAllowedToNotFoundMiddleware,
        # not by this directive (proxy_intercept_errors is off by default, so
        # upstream 4xx pass through untouched).
        error_page 403 =404 @not_found;
        error_page 404 @not_found;
        error_page 405 =404 @not_found;

        # Security headers (included in all location blocks via include)
        include /etc/nginx/security-headers.conf;

        # Neutral internal handler for nginx-generated 403/404 responses.
        location @not_found {
            include /etc/nginx/security-headers.conf;
            internal;
            default_type text/plain;
            return 404 "Not Found\n";
        }

        # Privacy policy -> Django (no auth required)
        location /privacy/ {
            include /etc/nginx/security-headers.conf;
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # API requests -> Django
        location /api/ {
            include /etc/nginx/security-headers.conf;
            add_header Cache-Control "no-store" always;
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
        }

        # /admin/ is NOT proxied to Django — Django's admin is not
        # URL-mounted in this project (see cookie/urls.py). The React SPA
        # exposes its admin-style pages under /settings, not /admin. The
        # `/admin` and `/admin/` paths are therefore scanner-bait; the
        # scanner-prefix block below blocks them with a 404.
        #
        # Removing this location block also resolves pentest round 6 / F-13:
        # the old `location /admin/ { proxy_pass ... }` caused nginx to auto-
        # emit a 301 trailing-slash redirect for `/admin`, with a default
        # body containing `<center>nginx</center>` that we could not suppress
        # cleanly. With no matching prefix location, `/admin` falls straight
        # through to the scanner-prefix block → `Not Found\n`.

        # Legacy frontend -> Django (no caching for dynamic HTML)
        location /legacy/ {
            include /etc/nginx/security-headers.conf;
            proxy_pass http://django;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $forwarded_proto;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            add_header Expires "0";
        }

        # Static files (Django collected)
        location /static/ {
            include /etc/nginx/security-headers.conf;
            alias /app/staticfiles/;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Media files
        location /media/ {
            include /etc/nginx/security-headers.conf;
            alias /app/data/media/;
        }

        # Block dotfiles except .well-known (scanner noise reduction).
        # Each scanner block returns an explicit "Not Found\n" body with
        # security headers so the response does NOT depend on `error_page 404
        # @not_found` inheritance — if a future edit moves or changes the
        # server-level error_page, these blocks still cannot leak the stock
        # `<center>nginx</center>` footer.
        #
        # The body MUST be non-empty. Nginx silently drops zero-length
        # `return` bodies and falls back to its default error page, which
        # re-introduces the proxy-identity leak (pentest round 6 F-1).
        location ~ /\.(?!well-known) {
            include /etc/nginx/security-headers.conf;
            default_type text/plain;
            return 404 "Not Found\n";
        }

        # Block sourcemap files (defense-in-depth — build also disables them)
        location ~* \.map$ {
            include /etc/nginx/security-headers.conf;
            default_type text/plain;
            return 404 "Not Found\n";
        }

        # Block sensitive file extensions that trigger scanner false positives
        # (these paths don't exist on disk but the SPA catch-all would serve index.html)
        location ~* \.(sql|sqlite3|bak|log|conf|cfg|ini|py|yaml|yml|toml|lock|sh|php|asp|jsp|pl|rb|xml)$ {
            include /etc/nginx/security-headers.conf;
            default_type text/plain;
            return 404 "Not Found\n";
        }

        # Block specific scanner-targeted filenames at root level
        location ~* ^/(Dockerfile|Makefile|Vagrantfile|Procfile|Gemfile|Rakefile|Thumbs\.db|requirements\.txt|Pipfile|manage\.py|server-status|server-info|crossdomain\.xml|clientaccesspolicy\.xml|apple-app-site-association|swagger\.json|manifest\.json)$ {
            include /etc/nginx/security-headers.conf;
            default_type text/plain;
            return 404 "Not Found\n";
        }

        # Block CMS / framework / admin scanner prefixes (pentest round 6 / F-4).
        # These paths were previously caught by the SPA catch-all and served
        # the full React index.html with a 200 — a strong enumeration signal
        # for scanners. Cookie exposes no routes at any of these prefixes;
        # admin-style UI lives under /settings, not /admin.
        #
        # Don't add anything Cookie actually uses here. Current Cookie paths
        # that MUST keep working: /api/*, /legacy/*, /privacy/, /static/*,
        # /media/*, /site.webmanifest, /.well-known/*, and the SPA routes
        # enumerated in frontend/src/router.tsx (/, /register, /home,
        # /search, /recipe/:id, /recipe/:id/play, /favorites, /all-recipes,
        # /collections, /collection/:id, /settings, /pair-device, /passkeys).
        location ~* ^/(admin|wp-admin|wp-login|wp-includes|wp-content|wp-json|phpmyadmin|pma|myadmin|adminer|mysql|actuator|manager|jmx-console|axis2|Telerik\.Web\.UI|dashboard|metrics|ping|docs)($|/) {
            include /etc/nginx/security-headers.conf;
            default_type text/plain;
            return 404 "Not Found\n";
        }

        # Serve a minimal RFC 9116 security.txt so coordinated-disclosure
        # finders know where to report issues (pentest round 6 / F-15).
        # Previously this path fell through to the SPA catch-all and served
        # the React homepage as HTML, which doesn't satisfy RFC 9116.
        #
        # Note: `Expires:` must be updated before this date. The value is
        # intentionally short (~1 year) to keep the contact info fresh.
        location = /.well-known/security.txt {
            include /etc/nginx/security-headers.conf;
            default_type text/plain;
            add_header Cache-Control "public, max-age=86400" always;
            return 200 "Contact: mailto:hello@matthewdeaves.com\nPreferred-Languages: en\nExpires: 2027-04-20T00:00:00Z\n";
        }

        # Serve a restrictive robots.txt. Cookie is a single-user PWA behind
        # CF Access; there's nothing we want search engines to index.
        # Previously this path fell through to the SPA catch-all and served
        # the React homepage with a 200 (pentest round 6 / F-4 enumeration).
        location = /robots.txt {
            include /etc/nginx/security-headers.conf;
            default_type text/plain;
            add_header Cache-Control "public, max-age=86400" always;
            return 200 "User-agent: *\nDisallow: /\n";
        }

        # PWA manifest — override default_type so browsers accept it under
        # `nosniff`. Without this nginx serves /site.webmanifest with the
        # http-level default_type (application/octet-stream) and Chromium /
        # Firefox refuse it, breaking "Add to Home Screen".
        location = /site.webmanifest {
            include /etc/nginx/security-headers.conf;
            root /app/frontend/dist;
            default_type application/manifest+json;
            add_header Cache-Control "no-cache" always;
        }

        # Modern frontend with legacy browser detection
        location / {
            include /etc/nginx/security-headers.conf;

            # Detect legacy browsers that can't run modern React (ES2020+)
            set $legacy_browser 0;

            if ($http_user_agent ~* "(?:iPhone|iPad|iPod).*OS [1-9]_") {
                set $legacy_browser 1;
            }
            if ($http_user_agent ~* "(?:iPhone|iPad|iPod).*OS 10_") {
                set $legacy_browser 1;
            }
            if ($http_user_agent ~* "MSIE |Trident/") {
                set $legacy_browser 1;
            }
            if ($http_user_agent ~* "Edge/[0-9]") {
                set $legacy_browser 1;
            }

            if ($legacy_browser = 1) {
                return 302 /legacy/;
            }

            root /app/frontend/dist;
            add_header Cache-Control "no-cache" always;
            try_files $uri $uri/ /index.html;

            location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                include /etc/nginx/security-headers.conf;
                expires 1y;
                add_header Cache-Control "public, immutable";
            }
        }
    }
}
