/* ============================================================

   Design concept: "Kitchen Command Center"
   Two-panel split layout that puts step instructions and timers
   side-by-side, with chunky navigation buttons designed for
   flour-covered fingers. Dark earthy palette throughout.

   NO: CSS Grid, var(), gap, sticky, backdrop-filter, :has(),

   ============================================================ */

}

}

.timer-panel {

/* ============================================================
   LANDSCAPE MODE — Side-by-side split layout
   This is the key improvement: on iPad landscape, the step
   instruction and timer panel sit side by side.
   ============================================================ */

@media (orientation: landscape) and (min-width: 700px) {
  .cook-body {
    -webkit-flex-direction: row;
    flex-direction: row;
  }

  .step-panel {
    -webkit-flex: 3;
    flex: 3;
    border-right: 1px solid #3a3028;
  }

  .step-nav {
    padding: 0 20px 12px 20px;
  }

  .timer-panel {
    -webkit-flex: 2;
    flex: 2;
    border-top: none;
    border-left: 1px solid #3a3028;
    max-height: none;
    overflow: hidden;
  }

  /* In landscape, timers are always expanded */
  .timer-panel .timer-body {
    display: -webkit-flex;
    display: flex;
    -webkit-flex: 1;
    flex: 1;
  }

  .timer-panel .timer-chevron {

    var counter = document.getElementById('step-counter');
    var progress = document.getElementById('progress-fill');
    var prevBtn = document.getElementById('prev-btn');
    var nextBtn = document.getElementById('next-btn');

    badge.textContent = currentStep + 1;
    text.textContent = steps[currentStep];
    counter.textContent = 'Step ' + (currentStep + 1) + ' of ' + totalSteps;
    progress.style.width = ((currentStep + 1) / totalSteps * 100) + '%';

    prevBtn.disabled = currentStep === 0;
    nextBtn.disabled = currentStep === totalSteps - 1;
  }

  document.getElementById('prev-btn').addEventListener('click', function() {
    if (currentStep > 0) {
      currentStep--;
      updateDisplay();
    }
  });

  document.getElementById('next-btn').addEventListener('click', function() {
    if (currentStep < totalSteps - 1) {
      currentStep++;
      updateDisplay();
    }
  });

  window.togglePanel = function() {
    var panel = document.getElementById('timer-panel');
    if (panel.className.indexOf('expanded') !== -1) {
      panel.className = 'timer-panel';
    } else {
      panel.className = 'timer-panel expanded';
    }
  };

  window.cycleStep = function() {
    currentStep = (currentStep + 1) % totalSteps;
    updateDisplay();
  };

  document.getElementById('timer-toggle').addEventListener('click', function() {
    window.togglePanel();
  });
})();
</script>

</body>
</html>
