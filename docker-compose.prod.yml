# Production Docker Compose
# Usage: docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Requires .env file with POSTGRES_PASSWORD set.
# For development, use: docker compose up (uses docker-compose.yml)

services:
  db:
    image: postgres:17-alpine
    container_name: cookie-db
    restart: unless-stopped
    volumes:
      - cookie-postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: cookie
      POSTGRES_USER: cookie
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cookie -d cookie"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ghcr.io/matthewdeaves/cookie:1.72.2
    container_name: cookie-prod
    ports:
      - "80:80"
    volumes:
      - cookie-media:/app/data/media
    environment:
      - DEBUG=false
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-}
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost,http://127.0.0.1}
      - DATABASE_URL=postgres://cookie:${POSTGRES_PASSWORD}@db:5432/cookie
      - AUTH_MODE=${AUTH_MODE:-home}
      # COOKIE_VERSION is baked into the image by the CD pipeline (see
      # Dockerfile.prod's ARG + ENV). Do NOT override it here — a compose-level
      # fallback of "dev" would silently mask a broken build-arg pipeline.
      - SECURE_SSL_REDIRECT=${SECURE_SSL_REDIRECT:-true}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    # Uncomment for CloudWatch log shipping (requires IAM role with logs:* permissions)
    # logging:
    #   driver: awslogs
    #   options:
    #     awslogs-group: /cookie/web
    #     awslogs-region: ${AWS_REGION:-eu-west-2}
    #     awslogs-stream-prefix: web
    #     awslogs-create-group: "true"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/api/system/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  cookie-postgres-data:
    name: cookie-postgres-data
  cookie-media:
    name: cookie-media
