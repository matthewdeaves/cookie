<!DOCTYPE html>
<html lang="en"{% if current_profile_theme == 'dark' %} class="dark"{% endif %}>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>{% block title %}Cookie{% endblock %}</title>
    {% load static %}
    <link rel="icon" href="{% static 'icons/favicon.ico' %}" sizes="48x48">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'icons/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'icons/favicon-16x16.png' %}">
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'icons/apple-touch-icon.png' %}">
    <link rel="apple-touch-icon" sizes="152x152" href="{% static 'icons/apple-touch-icon-152x152.png' %}">
    <link rel="apple-touch-icon" sizes="120x120" href="{% static 'icons/apple-touch-icon-120x120.png' %}">
    <link rel="apple-touch-icon" sizes="76x76" href="{% static 'icons/apple-touch-icon-76x76.png' %}">
    <meta name="theme-color" content="#6b8e5f">
    <link rel="stylesheet" href="{% static 'legacy/css/base.css' %}">
    <link rel="stylesheet" href="{% static 'legacy/css/components.css' %}">
    <link rel="stylesheet" href="{% static 'legacy/css/layout.css' %}">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- Toast container -->
    <div id="toast-container" class="toast-container"></div>

    {% block content %}{% endblock %}

    <script src="{% static 'legacy/js/polyfills.js' %}"></script>
    <script src="{% static 'legacy/js/ajax.js' %}"></script>
    <script src="{% static 'legacy/js/state.js' %}"></script>
    <script src="{% static 'legacy/js/toast.js' %}"></script>
    <script src="{% static 'legacy/js/ai-error.js' %}"></script>
    <script src="{% static 'legacy/js/utils.js' %}"></script>
    <script src="{% static 'legacy/js/app.js' %}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
