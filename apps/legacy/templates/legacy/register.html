{% extends "legacy/base.html" %}
{% block title %}Register - Cookie{% endblock %}

{% block content %}
<div style="display:-webkit-flex;display:flex;min-height:100vh;-webkit-align-items:center;align-items:center;-webkit-justify-content:center;justify-content:center;padding:20px;">
  <div style="width:100%;max-width:340px;">
    <h1 style="text-align:center;font-size:28px;margin-bottom:4px;">Cookie</h1>
    <p style="text-align:center;color:#888;margin-bottom:24px;font-size:14px;">Create your account</p>

    <div id="success-msg" style="display:none;background:#e6f9e6;color:#2d6b2d;padding:12px;border-radius:6px;margin-bottom:16px;font-size:14px;text-align:center;"></div>
    <div id="error-msg" style="display:none;background:#fde8e8;color:#9b1c1c;padding:10px;border-radius:6px;margin-bottom:16px;font-size:14px;"></div>

    <form id="register-form" onsubmit="return handleRegister(event)">
      <div style="margin-bottom:12px;">
        <label for="username" style="display:block;font-size:14px;font-weight:500;margin-bottom:4px;">Username</label>
        <input id="username" type="text" autocomplete="username" required
               style="width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:16px;box-sizing:border-box;">
        <div id="err-username" style="color:#9b1c1c;font-size:12px;margin-top:2px;"></div>
      </div>
      <div style="margin-bottom:12px;">
        <label for="email" style="display:block;font-size:14px;font-weight:500;margin-bottom:4px;">Email</label>
        <input id="email" type="email" autocomplete="email" required
               style="width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:16px;box-sizing:border-box;">
        <p style="font-size:11px;color:#aaa;margin-top:2px;">Used only for verification. Never stored.</p>
        <div id="err-email" style="color:#9b1c1c;font-size:12px;margin-top:2px;"></div>
      </div>
      <div style="margin-bottom:12px;">
        <label for="password" style="display:block;font-size:14px;font-weight:500;margin-bottom:4px;">Password</label>
        <input id="password" type="password" autocomplete="new-password" required
               style="width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:16px;box-sizing:border-box;">
        <div id="err-password" style="color:#9b1c1c;font-size:12px;margin-top:2px;"></div>
      </div>
      <div style="margin-bottom:12px;">
        <label for="password_confirm" style="display:block;font-size:14px;font-weight:500;margin-bottom:4px;">Confirm password</label>
        <input id="password_confirm" type="password" autocomplete="new-password" required
               style="width:100%;padding:8px 10px;border:1px solid #ccc;border-radius:6px;font-size:16px;box-sizing:border-box;">
        <div id="err-password_confirm" style="color:#9b1c1c;font-size:12px;margin-top:2px;"></div>
      </div>
      <div style="margin-bottom:16px;display:-webkit-flex;display:flex;-webkit-align-items:flex-start;align-items:flex-start;gap:8px;">
        <input id="privacy" type="checkbox" style="margin-top:3px;">
        <label for="privacy" style="font-size:13px;color:#888;">
          I have read and accept the <a href="/privacy/" target="_blank" style="color:#d97850;">privacy policy</a>
        </label>
      </div>
      <div id="err-privacy_accepted" style="color:#9b1c1c;font-size:12px;margin-bottom:8px;"></div>
      <button type="submit" id="submit-btn"
              style="width:100%;padding:10px;background:#d97850;color:#fff;border:none;border-radius:6px;font-size:16px;cursor:pointer;">
        Create account
      </button>
    </form>

    <p style="text-align:center;margin-top:16px;font-size:14px;color:#888;">
      Already have an account? <a href="/legacy/login/" style="color:#d97850;">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
/* ES5 only — iOS 9 compatible */
function handleRegister(e) {
  e.preventDefault();
  var errorEl = document.getElementById('error-msg');
  var successEl = document.getElementById('success-msg');
  var btn = document.getElementById('submit-btn');
  var form = document.getElementById('register-form');

  // Clear errors
  errorEl.style.display = 'none';
  var errFields = ['username', 'email', 'password', 'password_confirm', 'privacy_accepted'];
  for (var i = 0; i < errFields.length; i++) {
    var el = document.getElementById('err-' + errFields[i]);
    if (el) el.textContent = '';
  }

  var username = document.getElementById('username').value;
  var email = document.getElementById('email').value;
  var password = document.getElementById('password').value;
  var passwordConfirm = document.getElementById('password_confirm').value;
  var privacy = document.getElementById('privacy').checked;

  if (password !== passwordConfirm) {
    document.getElementById('err-password_confirm').textContent = 'Passwords do not match';
    return false;
  }

  btn.textContent = 'Creating account...';
  btn.disabled = true;

  var xhr = new XMLHttpRequest();
  xhr.open('POST', '/api/auth/register/');
  xhr.setRequestHeader('Content-Type', 'application/json');

  var csrfValue = '';
  var cookieParts = ('; ' + document.cookie).split('; csrftoken=');
  if (cookieParts.length === 2) {
    csrfValue = cookieParts.pop().split(';').shift();
  }
  if (csrfValue) {
    xhr.setRequestHeader('X-CSRFToken', csrfValue);
  }

  xhr.onload = function() {
    btn.textContent = 'Create account';
    btn.disabled = false;

    var data;
    if (xhr.status === 201) {
      data = JSON.parse(xhr.responseText);
      form.style.display = 'none';
      successEl.textContent = data.message || 'Check your email to verify your account.';
      successEl.style.display = 'block';
    } else {
      try {
        data = JSON.parse(xhr.responseText);
        if (data.errors) {
          for (var field in data.errors) {
            var errEl = document.getElementById('err-' + field);
            if (errEl) {
              errEl.textContent = data.errors[field].join(', ');
            }
          }
        } else if (data.error) {
          errorEl.textContent = data.error;
          errorEl.style.display = 'block';
        }
      } catch(ex) {
        errorEl.textContent = 'Registration failed';
        errorEl.style.display = 'block';
      }
    }
  };
  xhr.onerror = function() {
    btn.textContent = 'Create account';
    btn.disabled = false;
    errorEl.textContent = 'Network error. Please try again.';
    errorEl.style.display = 'block';
  };

  xhr.send(JSON.stringify({
    username: username,
    password: password,
    password_confirm: passwordConfirm,
    email: email,
    privacy_accepted: privacy
  }));
  return false;
}
</script>
{% endblock %}
